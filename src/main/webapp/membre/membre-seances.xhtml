<!-- ══════════════════════════════════
     SECTION : MES SÉANCES — CRUD complet
     READ   : voir réservations à venir + historique
     UPDATE : annuler une réservation
     FILTER : filtrer par statut / mois
══════════════════════════════════ -->
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets">

<div class="fz-section" id="section-seances">
<style>
/* ── FILTERS BAR ── */
.fz-filter-bar {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 20px; flex-wrap: wrap;
}
.fz-filter-chip {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted2);
    font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: var(--font-sans);
    transition: all .2s;
    user-select: none;
}
.fz-filter-chip:hover { border-color: rgba(249,115,22,.3); color: var(--accent); }
.fz-filter-chip.active {
    background: rgba(249,115,22,.12);
    border-color: rgba(249,115,22,.4);
    color: var(--accent);
}
.fz-filter-search {
    margin-left: auto;
    position: relative; display: flex; align-items: center;
}
.fz-filter-search input {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 20px; padding: 7px 14px 7px 34px;
    color: var(--text); font-size: 12.5px;
    font-family: var(--font-sans);
    outline: none; width: 200px;
    transition: border-color .2s;
}
.fz-filter-search input:focus { border-color: rgba(249,115,22,.4); }
.fz-filter-search svg {
    position: absolute; left: 11px;
    width: 13px; height: 13px; stroke: var(--muted); fill: none; stroke-width: 2;
    pointer-events: none;
}

/* ── SEANCES CARDS GRID ── */
.fz-seances-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
}
.fz-seance-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex; flex-direction: column;
    transition: border-color .2s, transform .2s;
}
.fz-seance-card:hover { border-color: rgba(249,115,22,.25); transform: translateY(-2px); }
.fz-seance-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px 0;
}
.fz-seance-date { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .5px; }
.fz-seance-body { padding: 12px 18px; flex: 1; }
.fz-seance-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
.fz-seance-meta { display: flex; flex-direction: column; gap: 6px; }
.fz-seance-meta-item {
    display: flex; align-items: center; gap: 7px;
    font-size: 12px; color: var(--muted2);
}
.fz-seance-meta-item svg { width: 12px; height: 12px; fill: none; stroke: var(--muted); stroke-width: 2; flex-shrink: 0; }
.fz-seance-footer {
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,.015);
}
.fz-seance-coach { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted2); }
.fz-mini-avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #c2410c);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: #fff;
}

/* Séance card — color strip by category */
.fz-seance-card::before {
    content: '';
    display: block;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), transparent);
}

/* Detail button */
.fz-btn-detail {
    padding: 6px 12px;
    background: rgba(59,130,246,.08);
    border: 1px solid rgba(59,130,246,.2);
    border-radius: var(--radius-sm);
    color: #3b82f6; font-size: 11.5px; font-weight: 600;
    cursor: pointer; font-family: var(--font-sans); transition: all .2s;
}
.fz-btn-detail:hover { background: rgba(59,130,246,.16); }
</style>

    <!-- Messages JSF -->
    <h:messages globalOnly="false" styleClass="fz-messages"
                infoClass="fz-msg-info" errorClass="fz-msg-error"/>

    <!-- Header -->
    <div class="fz-section-header">
        <div class="fz-section-eyebrow"><span>Planning</span></div>
        <div class="fz-section-title">MES <span>SÉANCES</span></div>
    </div>

    <!-- ── RESERVATIONS À VENIR ── -->
    <div style="font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;">
        Prochaines réservations
        <span style="color:var(--accent);font-family:var(--font-mono);font-size:13px;margin-left:8px;">
            <h:outputText value="#{membreBean.reservationsAvenir.size()}"/>
        </span>
    </div>

    <!-- Filter bar (JS uniquement — filtrage côté client) -->
    <div class="fz-filter-bar" id="filter-bar-avenir">
        <button class="fz-filter-chip active" onclick="filterSeances('avenir','all',this)">Toutes</button>
        <button class="fz-filter-chip" onclick="filterSeances('avenir','yoga',this)">Yoga</button>
        <button class="fz-filter-chip" onclick="filterSeances('avenir','cardio',this)">Cardio</button>
        <button class="fz-filter-chip" onclick="filterSeances('avenir','muscu',this)">Muscu</button>
        <div class="fz-filter-search">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Rechercher une séance…" oninput="searchSeances('avenir',this.value)"/>
        </div>
    </div>

    <h:panelGroup rendered="#{not empty membreBean.reservationsAvenir}" layout="block">
        <div class="fz-seances-grid" id="grid-avenir">
            <ui:repeat value="#{membreBean.reservationsAvenir}" var="res">
                <div class="fz-seance-card" data-titre="#{res.seance.titre}" data-cat="#{res.seance.categorie}">
                    <div class="fz-seance-header">
                        <div class="fz-seance-date">
                            <h:outputText value="#{res.seance.dateHeure}">
                                <f:convertDateTime pattern="EEE dd MMM yyyy" type="localDateTime" locale="fr"/>
                            </h:outputText>
                        </div>
                        <span class="fz-badge fz-badge-orange">À venir</span>
                    </div>
                    <div class="fz-seance-body">
                        <div class="fz-seance-name"><h:outputText value="#{res.seance.titre}"/></div>
                        <div class="fz-seance-meta">
                            <div class="fz-seance-meta-item">
                                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
                                <h:outputText value="#{res.seance.dateHeure}">
                                    <f:convertDateTime pattern="HH:mm" type="localDateTime"/>
                                </h:outputText>
                                &#160;— <h:outputText value="#{res.seance.duree}"/> min
                            </div>
                            <div class="fz-seance-meta-item">
                                <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                                <h:outputText value="#{res.seance.salle.nomSalle}"/>
                                &#160;<span style="color:var(--muted);">Cap. <h:outputText value="#{res.seance.capaciteMaximale}"/></span>
                            </div>
                            <div class="fz-seance-meta-item">
                                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                Réservé le&#160;
                                <h:outputText value="#{res.dateReservation}">
                                    <f:convertDateTime pattern="dd/MM/yyyy" type="localDateTime"/>
                                </h:outputText>
                            </div>
                        </div>
                    </div>
                    <div class="fz-seance-footer">
                        <div class="fz-seance-coach">
                            <div class="fz-mini-avatar">
                                <h:outputText value="#{res.seance.coach.utilisateur.initiales}"/>
                            </div>
                            Coach&#160;<h:outputText value="#{res.seance.coach.utilisateur.prenom}"/>
                        </div>
                        <div style="display:flex;gap:8px;">
                            <h:form>
                                <h:commandButton value="✕ Annuler" styleClass="fz-annuler-btn"
                                                 action="#{membreBean.annulerReservation}"
                                                 onclick="return confirm('Annuler cette réservation ?')">
                                    <f:setPropertyActionListener
                                        target="#{membreBean.reservationAannuler}"
                                        value="#{res.id}"/>
                                </h:commandButton>
                            </h:form>
                        </div>
                    </div>
                </div>
            </ui:repeat>
        </div>
    </h:panelGroup>
    <h:panelGroup rendered="#{empty membreBean.reservationsAvenir}" layout="block">
        <div class="fz-empty" style="margin-bottom:24px;">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <div class="fz-empty-title">Aucune séance à venir</div>
            <div class="fz-empty-sub">Rendez-vous dans <em>S'inscrire</em> pour réserver une séance.</div>
        </div>
    </h:panelGroup>

    <!-- ── HISTORIQUE ── -->
    <div class="fz-table-wrap">
        <div class="fz-table-header">
            Historique des séances
            <div class="fz-filter-search" style="margin-left:0;">
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" placeholder="Filtrer…" oninput="filterHistorique(this.value)"
                       style="width:180px;border-radius:6px;padding:6px 12px 6px 30px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font-sans);font-size:12px;outline:none;"/>
            </div>
        </div>
        <h:panelGroup rendered="#{not empty membreBean.reservationsHistorique}" layout="block">
            <table class="fz-table" id="table-historique">
                <thead>
                    <tr>
                        <th>Séance</th>
                        <th>Catégorie</th>
                        <th>Date</th>
                        <th>Horaire</th>
                        <th>Durée</th>
                        <th>Coach</th>
                        <th>Salle</th>
                        <th>Statut</th>
                    </tr>
                </thead>
                <tbody>
                    <ui:repeat value="#{membreBean.reservationsHistorique}" var="res">
                        <tr>
                            <td style="font-weight:600;">
                                <h:outputText value="#{res.seance.titre}"/>
                            </td>
                            <td>
                                <span class="fz-badge fz-badge-blue">
                                    <h:outputText value="#{res.seance.categorie}"/>
                                </span>
                            </td>
                            <td>
                                <h:outputText value="#{res.seance.dateHeure}">
                                    <f:convertDateTime pattern="dd/MM/yyyy" type="localDateTime"/>
                                </h:outputText>
                            </td>
                            <td style="font-family:var(--font-mono);font-size:12px;">
                                <h:outputText value="#{res.seance.dateHeure}">
                                    <f:convertDateTime pattern="HH:mm" type="localDateTime"/>
                                </h:outputText>
                            </td>
                            <td><h:outputText value="#{res.seance.duree}"/> min</td>
                            <td>
                                <h:outputText value="#{res.seance.coach.utilisateur.prenom}"/>
                                &#160;<h:outputText value="#{res.seance.coach.utilisateur.nom}"/>
                            </td>
                            <td><h:outputText value="#{res.seance.salle.nomSalle}"/></td>
                            <td>
                                <span class="fz-badge
                                    #{res.statutReservation == 'confirmee' or res.statutReservation == 'terminee' ? 'fz-badge-green' :
                                      res.statutReservation == 'annulee' ? 'fz-badge-gray' : 'fz-badge-orange'}">
                                    <h:outputText value="#{res.statutReservation == 'confirmee' ? 'Présent' :
                                        res.statutReservation == 'terminee' ? 'Terminée' :
                                        res.statutReservation == 'annulee' ? 'Annulée' : 'En attente'}"/>
                                </span>
                            </td>
                        </tr>
                    </ui:repeat>
                </tbody>
            </table>
        </h:panelGroup>
        <h:panelGroup rendered="#{empty membreBean.reservationsHistorique}" layout="block">
            <div class="fz-empty" style="padding:36px;border:none;">
                <div class="fz-empty-sub">Aucune séance passée.</div>
            </div>
        </h:panelGroup>
    </div>

    <!-- ── JS FILTERING ── -->
    <script>
    //<![CDATA[
    function filterSeances(gridId, cat, btn) {
        document.querySelectorAll('#filter-bar-avenir .fz-filter-chip').forEach(function(c){ c.classList.remove('active'); });
        btn.classList.add('active');
        var cards = document.querySelectorAll('#grid-avenir .fz-seance-card');
        cards.forEach(function(c){
            var matches = cat === 'all' || (c.dataset.cat || '').toLowerCase().includes(cat);
            c.style.display = matches ? '' : 'none';
        });
    }
    function searchSeances(gridId, val) {
        val = val.toLowerCase();
        document.querySelectorAll('#grid-avenir .fz-seance-card').forEach(function(c){
            c.style.display = (c.dataset.titre||'').toLowerCase().includes(val) ? '' : 'none';
        });
    }
    function filterHistorique(val) {
        val = val.toLowerCase();
        var rows = document.querySelectorAll('#table-historique tbody tr');
        rows.forEach(function(r){
            r.style.display = r.textContent.toLowerCase().includes(val) ? '' : 'none';
        });
    }
    //]]>
    </script>

</div><!-- /section-seances -->
</ui:composition>
