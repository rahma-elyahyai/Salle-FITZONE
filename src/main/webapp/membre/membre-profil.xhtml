<!-- ══════════════════════════════════
     SECTION : MON PROFIL — CRUD complet
     READ    : afficher informations
     UPDATE  : modifier téléphone, adresse
     UPDATE  : changer mot de passe (nouveau CRUD)
══════════════════════════════════ -->
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets">

<div class="fz-section" id="section-profil">
<style>
/* ── PROFIL WRAP ── */
.fz-profile-wrap {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 20px;
    align-items: flex-start;
}

/* ── IDENTITY CARD ── */
.fz-profile-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 22px;
    display: flex; flex-direction: column; align-items: center;
    text-align: center; gap: 10px;
    position: sticky; top: 80px;
}
.fz-profile-avatar-lg {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #c2410c);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 700; color: #fff;
    margin-bottom: 4px;
    box-shadow: 0 0 0 4px rgba(249,115,22,.15), var(--glow);
}
.fz-profile-fullname { font-size: 16px; font-weight: 700; color: var(--text); }
.fz-profile-badge {
    display: inline-block;
    padding: 3px 12px;
    background: rgba(249,115,22,.1); border: 1px solid rgba(249,115,22,.25);
    border-radius: 20px; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent);
}
.fz-profile-info-grid { width: 100%; margin-top: 8px; display: flex; flex-direction: column; gap: 0; }
.fz-profile-row { display: flex; flex-direction: column; padding: 9px 0; border-bottom: 1px solid var(--border); text-align: left; }
.fz-profile-row:last-child { border-bottom: none; }
.fz-profile-row-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.fz-profile-row-val { font-size: 13px; color: var(--text); font-weight: 500; }

/* ── DETAILS PANEL ── */
.fz-profile-details {
    display: flex; flex-direction: column; gap: 16px;
}
.fz-profile-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
}
.fz-profile-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 22px;
    border-bottom: 1px solid var(--border);
}
.fz-profile-panel-title {
    font-size: 13px; font-weight: 700; color: var(--text);
    display: flex; align-items: center; gap: 9px;
}
.fz-profile-panel-title svg { width: 15px; height: 15px; fill: none; stroke: var(--accent); stroke-width: 2; }
.fz-profile-panel-body { padding: 22px; }

/* ── DETAIL GRID ── */
.fz-detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}
.fz-detail-field { display: flex; flex-direction: column; gap: 6px; }
.fz-detail-field label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
.fz-detail-val {
    font-size: 13.5px; color: var(--text); font-weight: 500;
    padding: 9px 12px;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: var(--radius-sm);
}
.fz-field-full { grid-column: 1 / -1; }

/* ── EDIT FORM ── */
.fz-input-edit {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 13.5px;
    padding: 10px 14px;
    transition: border-color .2s, box-shadow .2s;
    outline: none;
}
.fz-input-edit:focus {
    border-color: rgba(249,115,22,.5);
    box-shadow: 0 0 0 3px rgba(249,115,22,.08);
}
.fz-input-edit::placeholder { color: var(--muted); }
.fz-val-readonly {
    font-size: 13.5px; color: var(--muted2);
    padding: 9px 12px;
    background: rgba(255,255,255,.02);
    border: 1px dashed rgba(255,255,255,.06);
    border-radius: var(--radius-sm);
}

/* ── ACTIONS ── */
.fz-edit-actions { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }
.fz-btn-save {
    padding: 10px 22px;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 700; font-family: var(--font-sans);
    cursor: pointer; transition: all .2s;
}
.fz-btn-save:hover { background: var(--accent2); box-shadow: var(--glow); }
.fz-btn-cancel {
    padding: 10px 18px;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted2); border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600; font-family: var(--font-sans);
    cursor: pointer; transition: all .2s;
}
.fz-btn-cancel:hover { border-color: var(--red); color: var(--red); }
.fz-edit-btn {
    padding: 7px 14px;
    background: rgba(249,115,22,.08); border: 1px solid rgba(249,115,22,.2);
    border-radius: var(--radius-sm); color: var(--accent);
    font-size: 12px; font-weight: 600; font-family: var(--font-sans);
    cursor: pointer; transition: all .2s;
}
.fz-edit-btn:hover { background: rgba(249,115,22,.18); }

/* ── PASSWORD SECTION ── */
.fz-pwd-notice {
    font-size: 12.5px; color: var(--muted2);
    padding: 12px 14px;
    background: rgba(59,130,246,.06); border: 1px solid rgba(59,130,246,.15);
    border-radius: var(--radius-sm);
    margin-bottom: 16px;
}
.fz-pwd-strength { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
.fz-pwd-strength-bar { height: 4px; border-radius: 99px; background: rgba(255,255,255,.07); overflow: hidden; }
.fz-pwd-strength-fill { height: 100%; border-radius: 99px; width: 0; transition: width .4s, background .4s; }
.fz-pwd-strength-label { font-size: 10.5px; color: var(--muted); }

/* ── DANGER ZONE ── */
.fz-danger-zone {
    background: rgba(239,68,68,.04);
    border: 1px solid rgba(239,68,68,.15);
    border-radius: var(--radius);
    padding: 20px 22px;
}
.fz-danger-zone-title { font-size: 12px; font-weight: 700; color: var(--red); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
.fz-danger-zone-sub { font-size: 12.5px; color: var(--muted2); margin-bottom: 14px; }
</style>

    <!-- Messages JSF -->
    <h:messages globalOnly="false" styleClass="fz-messages"
                infoClass="fz-msg-info" errorClass="fz-msg-error"/>

    <!-- Header -->
    <div class="fz-section-header">
        <div class="fz-section-eyebrow"><span>Compte</span></div>
        <div class="fz-section-title">MON <span>PROFIL</span></div>
    </div>

    <div class="fz-profile-wrap">

        <!-- ── CARTE IDENTITÉ ── -->
        <div class="fz-profile-card">
            <div class="fz-profile-avatar-lg">
                <h:outputText value="#{authBean.initiales}"/>
            </div>
            <div class="fz-profile-fullname">
                <h:outputText value="#{authBean.utilisateurConnecte.prenom} #{authBean.utilisateurConnecte.nom}"/>
            </div>
            <div class="fz-profile-badge">Membre</div>
            <div class="fz-profile-info-grid">
                <div class="fz-profile-row">
                    <div class="fz-profile-row-label">Email</div>
                    <div class="fz-profile-row-val">
                        <h:outputText value="#{authBean.utilisateurConnecte.email}"/>
                    </div>
                </div>
                <div class="fz-profile-row">
                    <div class="fz-profile-row-label">Téléphone</div>
                    <div class="fz-profile-row-val">
                        <h:outputText value="#{empty authBean.utilisateurConnecte.telephone ? '—' : authBean.utilisateurConnecte.telephone}"/>
                    </div>
                </div>
                <div class="fz-profile-row">
                    <div class="fz-profile-row-label">Membre depuis</div>
                    <div class="fz-profile-row-val">
                        <h:outputText value="#{authBean.utilisateurConnecte.dateCreation}">
                            <f:convertDateTime pattern="dd/MM/yyyy" type="localDateTime"/>
                        </h:outputText>
                    </div>
                </div>
                <div class="fz-profile-row">
                    <div class="fz-profile-row-label">Abonnement</div>
                    <div class="fz-profile-row-val">
                        <span class="fz-badge #{membreBean.abonnementActif != null ? 'fz-badge-green' : 'fz-badge-gray'}" style="font-size:10px;">
                            <h:outputText value="#{membreBean.abonnementActif != null ? membreBean.typeAbonnementLabel : 'Aucun'}"/>
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── DETAILS PANELS ── -->
        <div class="fz-profile-details">

            <!-- ① Informations personnelles -->
            <div class="fz-profile-panel">
                <div class="fz-profile-panel-header">
                    <div class="fz-profile-panel-title">
                        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Informations personnelles
                    </div>
                    <!-- Mode lecture : bouton modifier -->
                    <h:panelGroup rendered="#{!membreBean.modeEditionProfil}" layout="block">
                        <h:form>
                            <h:commandButton value="✏ Modifier" styleClass="fz-edit-btn"
                                             action="#{membreBean.activerEdition}" immediate="true"/>
                        </h:form>
                    </h:panelGroup>
                </div>

                <div class="fz-profile-panel-body">

                    <!-- MODE LECTURE -->
                    <h:panelGroup rendered="#{!membreBean.modeEditionProfil}" layout="block">
                        <div class="fz-detail-grid">
                            <div class="fz-detail-field">
                                <label>Nom</label>
                                <div class="fz-detail-val"><h:outputText value="#{authBean.utilisateurConnecte.nom}"/></div>
                            </div>
                            <div class="fz-detail-field">
                                <label>Prénom</label>
                                <div class="fz-detail-val"><h:outputText value="#{authBean.utilisateurConnecte.prenom}"/></div>
                            </div>
                            <div class="fz-detail-field">
                                <label>Email</label>
                                <div class="fz-detail-val"><h:outputText value="#{authBean.utilisateurConnecte.email}"/></div>
                            </div>
                            <div class="fz-detail-field">
                                <label>Téléphone</label>
                                <div class="fz-detail-val">
                                    <h:outputText value="#{empty authBean.utilisateurConnecte.telephone ? 'Non renseigné' : authBean.utilisateurConnecte.telephone}"/>
                                </div>
                            </div>
                            <div class="fz-detail-field fz-field-full">
                                <label>Adresse</label>
                                <div class="fz-detail-val">
                                    <h:outputText value="#{empty membreBean.membre.adresse ? 'Non renseignée' : membreBean.membre.adresse}"/>
                                </div>
                            </div>
                            <div class="fz-detail-field">
                                <label>Inscription</label>
                                <div class="fz-detail-val">
                                    <h:outputText value="#{authBean.utilisateurConnecte.dateCreation}">
                                        <f:convertDateTime pattern="dd MMMM yyyy" type="localDateTime" locale="fr"/>
                                    </h:outputText>
                                </div>
                            </div>
                        </div>
                    </h:panelGroup>

                    <!-- MODE ÉDITION -->
                    <h:panelGroup rendered="#{membreBean.modeEditionProfil}" layout="block">
                        <h:form id="profilForm" styleClass="fz-edit-form">
                            <div class="fz-detail-grid">
                                <div class="fz-detail-field">
                                    <label>Nom</label>
                                    <div class="fz-val-readonly"><h:outputText value="#{authBean.utilisateurConnecte.nom}"/></div>
                                </div>
                                <div class="fz-detail-field">
                                    <label>Prénom</label>
                                    <div class="fz-val-readonly"><h:outputText value="#{authBean.utilisateurConnecte.prenom}"/></div>
                                </div>
                                <div class="fz-detail-field">
                                    <label>Email</label>
                                    <div class="fz-val-readonly"><h:outputText value="#{authBean.utilisateurConnecte.email}"/></div>
                                </div>
                                <div class="fz-detail-field">
                                    <label for="profilForm:inputTel">Téléphone</label>
                                    <h:inputText id="inputTel"
                                                 value="#{membreBean.telephone}"
                                                 styleClass="fz-input-edit"
                                                 placeholder="06 00 00 00 00"/>
                                </div>
                                <div class="fz-detail-field fz-field-full">
                                    <label for="profilForm:inputAdr">Adresse</label>
                                    <h:inputText id="inputAdr"
                                                 value="#{membreBean.adresse}"
                                                 styleClass="fz-input-edit"
                                                 placeholder="Votre adresse complète"/>
                                </div>
                            </div>
                            <div class="fz-edit-actions">
                                <h:commandButton value="Annuler" action="#{membreBean.annulerEdition}"
                                                 styleClass="fz-btn-cancel" immediate="true"/>
                                <h:commandButton value="💾 Sauvegarder" action="#{membreBean.sauvegarderProfil}"
                                                 styleClass="fz-btn-save"/>
                            </div>
                        </h:form>
                    </h:panelGroup>

                </div>
            </div>

            <!-- ② Changer mot de passe (nouveau CRUD UPDATE) -->
            <div class="fz-profile-panel">
                <div class="fz-profile-panel-header">
                    <div class="fz-profile-panel-title">
                        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        Sécurité — Changer le mot de passe
                    </div>
                    <button class="fz-edit-btn" type="button" onclick="togglePwdForm()">
                        <span id="pwd-btn-label">Modifier</span>
                    </button>
                </div>
                <div class="fz-profile-panel-body" id="pwd-form-wrap" style="display:none;">
                    <div class="fz-pwd-notice">
                        🔒 Pour votre sécurité, choisissez un mot de passe d'au moins 8 caractères avec des majuscules et des chiffres.
                    </div>
                    <h:form id="pwdForm">
                        <div class="fz-detail-grid">
                            <div class="fz-detail-field fz-field-full">
                                <label for="pwdForm:inputOldPwd">Mot de passe actuel</label>
                                <h:inputSecret id="inputOldPwd"
                                               value="#{membreBean.ancienMotDePasse}"
                                               styleClass="fz-input-edit"
                                               placeholder="Votre mot de passe actuel"/>
                            </div>
                            <div class="fz-detail-field">
                                <label for="pwdForm:inputNewPwd">Nouveau mot de passe</label>
                                <h:inputSecret id="inputNewPwd"
                                               value="#{membreBean.nouveauMotDePasse}"
                                               styleClass="fz-input-edit"
                                               placeholder="Nouveau mot de passe"
                                               oninput="updatePwdStrength(this.value)"/>
                                <div class="fz-pwd-strength">
                                    <div class="fz-pwd-strength-bar">
                                        <div class="fz-pwd-strength-fill" id="pwd-strength-fill"/>
                                    </div>
                                    <div class="fz-pwd-strength-label" id="pwd-strength-label">Entrez un mot de passe</div>
                                </div>
                            </div>
                            <div class="fz-detail-field">
                                <label for="pwdForm:inputConfirmPwd">Confirmer</label>
                                <h:inputSecret id="inputConfirmPwd"
                                               value="#{membreBean.confirmationMotDePasse}"
                                               styleClass="fz-input-edit"
                                               placeholder="Confirmer le mot de passe"/>
                            </div>
                        </div>
                        <div class="fz-edit-actions">
                            <button type="button" class="fz-btn-cancel" onclick="togglePwdForm()">Annuler</button>
                            <h:commandButton value="🔐 Changer le mot de passe"
                                             action="#{membreBean.changerMotDePasse}"
                                             styleClass="fz-btn-save"/>
                        </div>
                    </h:form>
                </div>
            </div>

            <!-- ③ Stats membres (READ) -->
            <div class="fz-profile-panel">
                <div class="fz-profile-panel-header">
                    <div class="fz-profile-panel-title">
                        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                        Statistiques
                    </div>
                </div>
                <div class="fz-profile-panel-body">
                    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
                        <div style="text-align:center;padding:16px;background:rgba(255,255,255,.03);border-radius:var(--radius-sm);border:1px solid var(--border);">
                            <div style="font-family:var(--font-mono);font-size:28px;color:var(--accent);">
                                <h:outputText value="#{membreBean.totalPresences}"/>
                            </div>
                            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px;">Présences</div>
                        </div>
                        <div style="text-align:center;padding:16px;background:rgba(255,255,255,.03);border-radius:var(--radius-sm);border:1px solid var(--border);">
                            <div style="font-family:var(--font-mono);font-size:28px;color:var(--green);">
                                <h:outputText value="#{membreBean.seancesCeMois}"/>
                            </div>
                            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px;">Ce mois</div>
                        </div>
                        <div style="text-align:center;padding:16px;background:rgba(255,255,255,.03);border-radius:var(--radius-sm);border:1px solid var(--border);">
                            <div style="font-family:var(--font-mono);font-size:28px;color:var(--blue);">
                                <h:outputText value="#{membreBean.reservationsAvenir.size()}"/>
                            </div>
                            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px;">À venir</div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- ── JS ── -->
    <script>
    //<![CDATA[
    function togglePwdForm() {
        var w = document.getElementById('pwd-form-wrap');
        var lbl = document.getElementById('pwd-btn-label');
        var open = w.style.display === 'none' || w.style.display === '';
        w.style.display = open ? 'block' : 'none';
        if (lbl) lbl.textContent = open ? 'Masquer' : 'Modifier';
    }
    function updatePwdStrength(val) {
        var fill  = document.getElementById('pwd-strength-fill');
        var label = document.getElementById('pwd-strength-label');
        if (!fill || !label) return;
        var score = 0;
        if (val.length >= 8)               score++;
        if (/[A-Z]/.test(val))             score++;
        if (/[0-9]/.test(val))             score++;
        if (/[^A-Za-z0-9]/.test(val))      score++;
        var levels = [
            { pct:'0%',   bg:'transparent',     txt:'Entrez un mot de passe' },
            { pct:'25%',  bg:'#ef4444',         txt:'Trop faible' },
            { pct:'50%',  bg:'#f97316',         txt:'Passable' },
            { pct:'75%',  bg:'#eab308',         txt:'Bon' },
            { pct:'100%', bg:'#22c55e',         txt:'Excellent ✓' }
        ];
        var lvl = val.length === 0 ? levels[0] : levels[Math.min(score, 4)];
        fill.style.width      = lvl.pct;
        fill.style.background = lvl.bg;
        label.textContent     = lvl.txt;
        label.style.color     = lvl.bg;
    }
    //]]>
    </script>

</div><!-- /section-profil -->
</ui:composition>
